name: Feature request
description: Propose a new feature or product improvement.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or maintainer problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the preferred behavior, workflow, or technical direction.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List simpler options, tradeoffs, or reasons to defer.
  - type: dropdown
    id: category
    attributes:
      label: Area
      options:
        - Product UX
        - Security / DevSecOps
        - Data model / Supabase
        - Documentation
        - Performance
    validations:
      required: true
